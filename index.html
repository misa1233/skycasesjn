<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #0a0c1a 0%, #1a1f35 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: auto;
            position: relative;
            padding: 20px;
        }

        .site-title {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px gold;
            background: rgba(20, 23, 26, 0.3);
            backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            z-index: 60;
            letter-spacing: 2px;
        }

        .mode-buttons {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 60;
        }

        .mode-btn {
            padding: 12px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            background: rgba(20, 23, 26, 0.3);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mode-btn.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            color: #ffd700;
        }

        .mode-btn:hover {
            transform: scale(1.05);
        }

        .profile-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: rgba(42, 109, 156, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            border: 1px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
            z-index: 50;
            transition: transform 0.2s;
        }

        .profile-button:hover {
            transform: scale(1.1);
        }

        .game-container {
            width: 1300px;
            min-height: 800px;
            max-height: 90vh;
            overflow-y: auto;
            background: rgba(30, 33, 38, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            z-index: 10;
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 80px 0 20px 0;
        }

        .game-container::-webkit-scrollbar {
            width: 4px;
        }

        .game-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .game-container::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.3);
            border-radius: 4px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
            flex-shrink: 0;
        }

        .balance-display {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 12px 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .balance-display span {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }

        .cases-title {
            font-size: 28px;
            font-weight: bold;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            padding: 10px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .cases-mode {
            display: block;
            width: 100%;
            flex: 1;
        }

        .cases-mode.hidden {
            display: none;
        }

        .cases-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            width: 100%;
            max-width: 1100px;
            margin: 20px auto;
            padding-bottom: 20px;
        }

        .case-card {
            background: rgba(20, 23, 26, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            border: 2px solid;
            transition: transform 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transform: scale(1);
        }

        .case-card.opening {
            animation: caseOpenAnimation 0.5s ease forwards;
            pointer-events: none;
        }

        @keyframes caseOpenAnimation {
            0% {
                transform: scale(1) rotate(0deg);
                filter: brightness(1);
            }
            25% {
                transform: scale(1.1) rotate(2deg);
                filter: brightness(1.2);
            }
            50% {
                transform: scale(1.15) rotate(-2deg);
                filter: brightness(1.4);
            }
            75% {
                transform: scale(1.1) rotate(1deg);
                filter: brightness(1.2);
            }
            100% {
                transform: scale(1) rotate(0deg);
                filter: brightness(1);
            }
        }

        .case-card:hover {
            transform: translateY(-5px);
            border-color: currentColor !important;
        }

        .case-icon {
            font-size: 64px;
            z-index: 1;
        }

        .case-name {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-align: center;
            z-index: 1;
        }

        .case-price {
            font-size: 20px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid;
            z-index: 1;
        }

        .case-card.standard { border-color: rgba(0, 255, 0, 0.3); }
        .case-card.standard .case-icon { color: #00ff00; }
        .case-card.standard .case-price { border-color: #00ff00; color: #00ff00; }

        .case-card.gold { border-color: rgba(255, 215, 0, 0.3); }
        .case-card.gold .case-icon { color: #ffd700; }
        .case-card.gold .case-price { border-color: #ffd700; color: #ffd700; }

        .case-card.crystal { border-color: rgba(0, 255, 255, 0.3); }
        .case-card.crystal .case-icon { color: #00ffff; }
        .case-card.crystal .case-price { border-color: #00ffff; color: #00ffff; }

        .case-card.fire { border-color: rgba(255, 69, 0, 0.3); }
        .case-card.fire .case-icon { color: #ff4500; }
        .case-card.fire .case-price { border-color: #ff4500; color: #ff4500; }

        .case-card.ice { border-color: rgba(135, 206, 235, 0.3); }
        .case-card.ice .case-icon { color: #87ceeb; }
        .case-card.ice .case-price { border-color: #87ceeb; color: #87ceeb; }

        .case-card.legend { border-color: rgba(255, 20, 147, 0.3); }
        .case-card.legend .case-icon { color: #ff1493; }
        .case-card.legend .case-price { border-color: #ff1493; color: #ff1493; }

        .case-card.risk { border-color: rgba(255, 0, 0, 0.3); }
        .case-card.risk .case-icon { color: #ff0000; }
        .case-card.risk .case-price { border-color: #ff0000; color: #ff0000; }

        .upgrade-mode {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            flex: 1;
        }

        .upgrade-mode.active {
            display: flex;
        }

        .upgrade-container {
            display: flex;
            width: 100%;
            gap: 40px;
            justify-content: center;
            flex-wrap: wrap;
            padding-bottom: 20px;
        }

        .upgrade-left {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .upgrade-right {
            width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .upgrade-section-title {
            font-size: 20px;
            color: white;
            margin-bottom: 10px;
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .nft-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .nft-selector::-webkit-scrollbar {
            width: 4px;
        }

        .nft-selector::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        .nft-selector::-webkit-scrollbar-thumb {
            background: rgba(255, 215, 0, 0.3);
            border-radius: 4px;
        }

        .nft-selector .nft-card {
            width: 100%;
            cursor: pointer;
            border-width: 1px;
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(20, 23, 26, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.2s;
        }

        .nft-selector .nft-card .nft-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        .nft-selector .nft-card .nft-value {
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
        }

        .nft-selector .nft-card.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }

        .upgrade-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .chance-display {
            font-size: 24px;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid #ffd700;
        }

        .chance-display span {
            color: #ffd700;
            font-weight: bold;
            font-size: 32px;
        }

        .upgrade-action-btn {
            background: linear-gradient(135deg, #ffd700, #b8860b);
            color: black;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 50px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .upgrade-action-btn:hover {
            transform: scale(1.05);
        }

        .upgrade-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .upgrade-modal,
        .case-info-modal,
        .profile-modal,
        .modal-overlay,
        .multi-roulette-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 350;
            overflow-y: auto;
            padding: 20px;
        }

        .upgrade-modal.active,
        .case-info-modal.active,
        .profile-modal.active,
        .modal-overlay.active,
        .multi-roulette-modal.active {
            display: flex;
        }

        .upgrade-modal-content,
        .case-info-content,
        .profile-content,
        .modal,
        .multi-roulette-content {
            max-height: 90vh;
            overflow-y: auto;
            background: rgba(30, 33, 38, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 32px;
            padding: 30px;
            position: relative;
            width: 500px;
        }

        .multi-roulette-content {
            width: 90%;
            max-width: 1200px;
        }

        .case-info-content {
            width: 500px;
        }

        .profile-content {
            width: 400px;
        }

        .modal {
            width: 400px;
        }

        .upgrade-modal-close,
        .case-info-close,
        .profile-close,
        .multi-roulette-close {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .upgrade-modal-close:hover,
        .case-info-close:hover,
        .profile-close:hover,
        .multi-roulette-close:hover {
            transform: scale(1.1);
        }

        .upgrade-wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .upgrade-wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#00ff00 0deg 0deg, #333 0deg 360deg);
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .wheel-arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid #ffd700;
            z-index: 10;
        }

        .wheel-arrow::before {
            content: '▼';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 20px;
        }

        @keyframes spinWheel {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(1440deg); }
        }

        .upgrade-wheel.spinning {
            animation: spinWheel 3s cubic-bezier(0.2, 0.8, 0.1, 1) forwards;
        }

        .upgrade-wheel.win {
            border: 2px solid #00ff00;
        }

        .upgrade-wheel.lose {
            border: 2px solid #ff0000;
        }

        .upgrade-result {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
        }

        .upgrade-result.win {
            color: #00ff00;
        }

        .upgrade-result.lose {
            color: #ff0000;
        }

        .case-info-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .case-info-icon {
            font-size: 80px;
        }

        .case-info-name {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-align: center;
        }

        .case-info-price {
            font-size: 24px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            padding: 8px 25px;
            border-radius: 40px;
            border: 1px solid currentColor;
            color: currentColor;
        }

        .case-info-items {
            margin: 25px 0;
        }

        .case-info-items-title {
            font-size: 18px;
            color: white;
            margin-bottom: 15px;
            text-align: center;
        }

        .case-info-items-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .case-info-item {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 1px solid currentColor;
        }

        .case-info-item-icon {
            font-size: 48px;
        }

        .case-info-item-name {
            font-size: 16px;
            color: white;
            text-align: center;
        }

        .case-info-item-value {
            font-size: 14px;
            color: currentColor;
            font-weight: bold;
        }

        .case-info-multiplier {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .case-info-multiplier-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #ffd700;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .case-info-multiplier-btn.active {
            background: rgba(255, 215, 0, 0.3);
            color: #ffd700;
        }

        .case-info-multiplier-btn:hover {
            transform: scale(1.05);
        }

        .case-info-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .case-info-open-btn {
            flex: 1;
            background: rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(5px);
            color: #ffd700;
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            border: 1px solid #ffd700;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .case-info-open-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: scale(1.02);
        }

        .case-info-cancel-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .case-info-cancel-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.02);
        }

        .multi-roulette-title {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
            text-align: center;
            margin-bottom: 20px;
        }

        .multi-roulette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .multi-roulette-item {
            background: rgba(20, 23, 26, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .multi-roulette-number {
            font-size: 18px;
            color: #ffd700;
            font-weight: bold;
        }

        .multi-roulette-wheel {
            width: 100%;
            height: 150px;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
        }

        .multi-roulette-track {
            display: flex;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transition: left 5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .multi-roulette-slot {
            width: 100px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(20, 23, 26, 0.8);
            border-right: 2px solid rgba(255, 215, 0, 0.3);
            color: #ffd700;
            font-size: 24px;
            flex-shrink: 0;
        }

        .multi-roulette-slot .icon {
            font-size: 32px;
        }

        .multi-roulette-slot .value {
            font-size: 16px;
            font-weight: bold;
        }

        .multi-roulette-arrow {
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid #ffd700;
            z-index: 10;
        }

        .multi-roulette-result {
            font-size: 16px;
            color: #ffd700;
            font-weight: bold;
            text-align: center;
        }

        .multi-roulette-total {
            font-size: 24px;
            color: #ffd700;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            border: 1px solid #ffd700;
        }

        .multi-roulette-claim-btn {
            background: linear-gradient(135deg, #ffd700, #b8860b);
            color: black;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
            width: 100%;
        }

        .multi-roulette-claim-btn:hover {
            transform: scale(1.02);
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: rgba(42, 109, 156, 0.3);
            backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            border: 1px solid #ffd700;
        }

        .username {
            font-size: 24px;
            font-weight: 600;
            color: white;
        }

        .user-tag {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(5px);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .stats {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;

                    selectedCard.classList.add('selected');

                selectedSourceNFT = { ...nft, index };

                selectedTargetNFT = nft;

            function updateChance() {
                if (selectedSourceNFT && selectedTargetNFT) {
                    const chance = Math.floor((selectedSourceNFT.tonValue / selectedTargetNFT.value) * 100);
                    chanceDisplay.innerHTML = `Шанс: <span>${Math.min(chance, 95)}%</span>`;
                    upgradeBtn.disabled = false;
                } else {
                    chanceDisplay.innerHTML = `Шанс: <span>0%</span>`;
                    upgradeBtn.disabled = true;
                }
            }

            function startUpgrade() {
                if (!selectedSourceNFT || !selectedTargetNFT) return;
                
                upgradeModal.classList.add('active');
                
                const chanceText = chanceDisplay.querySelector('span').textContent;
                const visualChance = parseInt(chanceText);
                
                const winDeg = (visualChance / 100) * 360;
                upgradeWheel.style.background = `conic-gradient(#00ff00 0deg ${winDeg}deg, #333 ${winDeg}deg 360deg)`;
                
                upgradeWheel.classList.remove('win', 'lose', 'spinning');
                upgradeResult.textContent = '';
                upgradeResult.classList.remove('win', 'lose');
                
                const realChance = Math.floor((selectedSourceNFT.tonValue / selectedTargetNFT.value) * 100);
                const isWin = Math.random() * 100 < realChance;
                
                let finalAngle;
                if (isWin) {
                    finalAngle = Math.random() * winDeg;
                } else {
                    finalAngle = winDeg + Math.random() * (360 - winDeg);
                }
                
                const totalRotation = 1440 + finalAngle;
                
                upgradeWheel.style.transform = `rotate(0deg)`;
                upgradeWheel.classList.add('spinning');
                
                if (upgradeTimeout) clearTimeout(upgradeTimeout);
                
                upgradeTimeout = setTimeout(() => {
                    upgradeWheel.classList.remove('spinning');
                    upgradeWheel.style.transform = `rotate(${totalRotation}deg)`;
                    
                    if (isWin) {
                        upgradeWheel.classList.add('win');
                        upgradeResult.textContent = '🎉 УСПЕХ!';
                        upgradeResult.classList.add('win');
                        
                        const newNFT = {
                            id: Date.now() + Math.random(),
                            name: selectedTargetNFT.name,
                            icon: selectedTargetNFT.icon,
                            color: selectedTargetNFT.color,
                            rarity: selectedTargetNFT.rarity,
                            tonValue: selectedTargetNFT.value
                        };
                        
                        nftCollection[selectedSourceNFT.index] = newNFT;
                    } else {
                        upgradeWheel.classList.add('lose');
                        upgradeResult.textContent = '💔 ПРОВАЛ';
                        upgradeResult.classList.add('lose');
                        
                        nftCollection.splice(selectedSourceNFT.index, 1);
                    }
                    
                    updateUI();
                    
                    selectedSourceNFT = null;
                    selectedTargetNFT = null;
                    
                    setTimeout(() => {
                        upgradeModal.classList.remove('active');
                        upgradeWheel.style.transform = '';
                    }, 2000);
                }, 3000);
            }

                            result = caseData.items[randomIndex];

                        const resultElement = document.getElementById(`multi-result-${i}`);

                            if (result.type === 'nft') {
                                resultStars.innerHTML = `${result.icon} ${result.name}`;
                            } else {
                                resultStars.textContent = result.value.toString() + ' ⭐';
                            }
                            resultStars.style.color = '#ffd700';
                            rouletteResult.style.display = 'block';
                            
                            rouletteClose.classList.add('active');
                            
                            clearInterval(timerInterval);
                            rouletteTimer.textContent = '0.0 сек';
                            
                            currentDrop = result;
                            
                        }, 5000);
                        
                        setTimeout(() => {
                            caseElement.classList.remove('opening');
                            isOpening = false;
                        }, 100);
                        
                    }, 500);
                }
            }

            function showCaseInfo(caseData) {
                selectedCase = caseData;
                
                caseInfoIcon.textContent = caseData.icon;
                caseInfoIcon.style.color = caseData.color;
                caseInfoName.textContent = caseData.name;
                caseInfoPrice.textContent = caseData.price + ' ⭐';
                caseInfoPrice.style.color = caseData.color;
                caseInfoPrice.style.borderColor = caseData.color;
                
                caseInfoContent.style.borderColor = caseData.color;
                
                caseInfoItemsGrid.innerHTML = '';
                
                caseData.items.forEach(item => {
                    const itemElement = document.createElement('div');
                    itemElement.className = 'case-info-item';
                    itemElement.style.color = item.color;
                    
                    if (item.type === 'nft') {
                        itemElement.innerHTML = `
                            <div class="case-info-item-icon" style="color: ${item.color}">${item.icon}</div>
                            <div class="case-info-item-name">${item.name}</div>
                            <div class="case-info-item-value">${item.tonValue} TON</div>
                        `;
                    } else {
                        itemElement.innerHTML = `
                            <div class="case-info-item-icon" style="color: ${item.color}">${item.icon}</div>
                            <div class="case-info-item-name">${item.name}</div>
                            <div class="case-info-item-value">${item.value} ⭐</div>
                        `;
                    }
                    
                    caseInfoItemsGrid.appendChild(itemElement);
                });
                
                caseMultiplier = 1;
                document.querySelectorAll('.case-info-multiplier-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.multiplier === '1') {
                        btn.classList.add('active');
                    }
                });
                
                caseInfoModal.classList.add('active');
            }

            function claimReward() {
                if (!rouletteClose.classList.contains('active')) {
                    alert('Подождите окончания прокрутки!');
                    return;
                }
                
                rouletteContainer.classList.remove('active');
                rouletteResult.style.display = 'none';
                rouletteTrack.style.transition = 'none';
                rouletteTrack.style.left = '0';
                
                progressBar.style.width = '0%';
                rouletteTimer.textContent = '5.0 сек';
                
                if (rouletteTimeout) clearTimeout(rouletteTimeout);
                if (timerInterval) clearInterval(timerInterval);
                
                if (currentDrop.type === 'nft') {
                    createNFT(currentDrop, 1);
                } else {
                    totalStars += currentDrop.value;
                    createStar(Math.min(currentDrop.value, 50));
                    updateUI();
                }
            }

            function claimMultiReward() {
                multiRouletteModal.classList.remove('active');
                
                let totalReward = 0;
                let totalNFTs = [];
                
                multiRouletteResults.forEach(result => {
                    if (result.type === 'nft') {
                        totalNFTs.push(result);
                    } else {
                        totalReward += result.value;
                    }
                });
                
                if (totalNFTs.length > 0) {
                    totalNFTs.forEach(nft => createNFT(nft, 1));
                }
                
                if (totalReward > 0) {
                    totalStars += totalReward;
                    createStar(Math.min(totalReward, 50));
                }
                
                updateUI();
                
                if (multiRouletteTimeout) clearTimeout(multiRouletteTimeout);
            }

            function withdrawNFT() {
                if (nftCollection.length === 0) return;
                
                const count = nftCollection.length;
                nftCollection = [];
                updateUI();
                alert(`✅ Выведено ${count} NFT`);
            }

            function openDepositModal() {
                depositAmount.value = '100';
                modalOverlay.classList.add('active');
            }

            function closeDepositModal() {
                modalOverlay.classList.remove('active');
            }

            function confirmDepositHandler() {
                const amount = parseInt(depositAmount.value);
                if (amount && amount > 0) {
                    totalStars += amount;
                    createStar(Math.min(amount, 50));
                    updateUI();
                    alert(`✅ Баланс пополнен на ${amount} звезд!`);
                    closeDepositModal();
                } else {
                    alert('❌ Введите корректную сумму');
                }
            }

            function renderCases() {
                casesGrid.innerHTML = '';
                cases.forEach(caseData => {
                    const caseCard = document.createElement('div');
                    caseCard.className = `case-card ${caseData.class}`;
                    
                    caseCard.innerHTML = `
                        <div class="case-icon">${caseData.icon}</div>
                        <div class="case-name">${caseData.name}</div>
                        <div class="case-price" style="border-color: ${caseData.color}; color: ${caseData.color};">${caseData.price} ⭐</div>
                    `;
                    
                    caseCard.addEventListener('click', () => showCaseInfo(caseData));
                    casesGrid.appendChild(caseCard);
                });
            }

            casesModeBtn.addEventListener('click', () => {
                casesModeBtn.classList.add('active');
                upgradeModeBtn.classList.remove('active');
                casesMode.style.display = 'block';
                upgradeMode.classList.remove('active');
                modeTitle.textContent = 'КЕЙСЫ';
            });

            upgradeModeBtn.addEventListener('click', () => {
                upgradeModeBtn.classList.add('active');
                casesModeBtn.classList.remove('active');
                casesMode.style.display = 'none';
                upgradeMode.classList.add('active');
                modeTitle.textContent = 'АПГРЕЙД';
                updateNFTSSelectors();
            });

            profileButton.addEventListener('click', () => {
                profileModal.classList.add('active');
            });

            profileClose.addEventListener('click', () => {
                profileModal.classList.remove('active');
            });

            profileModal.addEventListener('click', (e) => {
                if (e.target === profileModal) {
                    profileModal.classList.remove('active');
                }
            });

            caseInfoClose.addEventListener('click', () => {
                caseInfoModal.classList.remove('active');
            });

            caseInfoCancelBtn.addEventListener('click', () => {
                caseInfoModal.classList.remove('active');
            });

            caseInfoModal.addEventListener('click', (e) => {
                if (e.target === caseInfoModal) {
                    caseInfoModal.classList.remove('active');
                }
            });

            multiplierBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    multiplierBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    caseMultiplier = parseInt(btn.dataset.multiplier);
                });
            });

            caseInfoOpenBtn.addEventListener('click', openCaseFromInfo);

            multiRouletteClose.addEventListener('click', () => {
                multiRouletteModal.classList.remove('active');
                if (multiRouletteTimeout) clearTimeout(multiRouletteTimeout);
            });

            multiRouletteClaimBtn.addEventListener('click', claimMultiReward);

            multiRouletteModal.addEventListener('click', (e) => {
                if (e.target === multiRouletteModal) {
                    multiRouletteModal.classList.remove('active');
                    if (multiRouletteTimeout) clearTimeout(multiRouletteTimeout);
                }
            });

            upgradeBtn.addEventListener('click', startUpgrade);
            
            upgradeModalClose.addEventListener('click', () => {
                upgradeModal.classList.remove('active');
                if (upgradeTimeout) clearTimeout(upgradeTimeout);
            });

            upgradeModal.addEventListener('click', (e) => {
                if (e.target === upgradeModal) {
                    upgradeModal.classList.remove('active');
                    if (upgradeTimeout) clearTimeout(upgradeTimeout);
                }
            });

            rouletteClose.addEventListener('click', claimReward);
            rouletteOverlay.addEventListener('click', claimReward);
            withdrawBtn.addEventListener('click', withdrawNFT);
            depositBtn.addEventListener('click', openDepositModal);
            confirmDeposit.addEventListener('click', confirmDepositHandler);
            cancelDeposit.addEventListener('click', closeDepositModal);
            modalClose.addEventListener('click', closeDepositModal);
            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) closeDepositModal();
            });
            
            renderCases();
            updateUI();
        });
    </script>
</body>
</html>
